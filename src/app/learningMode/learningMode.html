<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="learningMode.css">
    <title>Learning Mode</title>
</head>
<body>

<div class="header">
    <h1 id="backButton">➜</h1>
    <h1 id="kartenTitel">{Fach} <br> lernen</h1>
    <button id="settingsBtn">&#9881</button>
</div>

    <div class="content">
        <div class="card-container">
            <div class="card">
                <div class="card-front">
                    <div class="textOutputDiv">Frage: 2 + 2 = ?</div>
                    <div class="answer-line"></div>
                    <button class="show-answer-btn">Antwort anzeigen</button>
                </div>

                <div class="card-back">
                    <div class="textOutputDiv">Antwort: 4</div>
                    <div class="answer-btns">
                        <button class="correct-btn">Richtig</button>
                        <button class="wrong-btn">Falsch</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.querySelector('.card'); // das ganze Karten-Element
        const showAnswerBtn = document.querySelector('.show-answer-btn');
        const correctBtn = document.querySelector('.correct-btn');
        const wrongBtn = document.querySelector('.wrong-btn');

        // Flippe Karte nach Klick auf "Antwort anzeigen"
        showAnswerBtn.addEventListener('click', () => {
            card.classList.add('flipped');
        });

        // Beispiel: Karte wieder zurückflippen nach Klick auf "Richtig" (nur aktuell so!)
        correctBtn.addEventListener('click', () => {
            card.classList.remove('flipped');
        });

        // Beispiel: Karte wieder zurückflippen nach Klick auf "Falsch" (nur aktuell so!)
        wrongBtn.addEventListener('click', () => {
            card.classList.remove('flipped');
        });
    </script>
</body>
</html>
