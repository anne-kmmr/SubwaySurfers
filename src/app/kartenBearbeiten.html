<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karten Bearbeiten</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
</head>
<body>
    <container class="header">
        <h1 id="backButton">➜</h1>    
        <h1 id="kartenTitel">Karte <br> Bearbeiten</h1>
        <button id="settingsBtn">&#9881</button>
    </container>
    <container class="content">
        <div class="frageDiv">
            <h2>Frage:</h2>
            <input type="text" class="textInpt" placeholder="Frage eingeben..." value="2 + 2 = ?">
        </div>
        <div class="antwortDiv" id="antwort">
            <h2>Antwort:</h2>
            <input type="text" class="textInpt"placeholder="Antwort eingeben..." value="4">
        </div>
    </container>
    <container class="submitChanges">
        <button class="änderungBtn"id="speichernBtn">Speichern</button>
        <button class="änderungBtn"id="abbrechenBtn">Abbrechen</button>
    </container>
</html>
